<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cúspides — Viví la montaña desde adentro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ======= HERO (nav + imagen + título) ======= -->
  <section class="hero">
    <div class="hero__pin">

      <!-- Capa de fondo: montaña con cielo celeste -->
      <div class="hero__bg hero__bg--back">
        <img src="assets/img/heroatras.jpg" alt="Montaña patagónica con cielo despejado">
      </div>

      <!-- Navbar -->
      <header class="navbar">
        <a href="#" class="navbar__logo">
          <img src="assets/img/logo.png" alt="Cúspides">
        </a>
        <nav class="navbar__nav">
          <ul class="navbar__list">
            <li class="navbar__item"><a href="#" class="navbar__link">Quiénes somos</a></li>
            <li class="navbar__item"><a href="#" class="navbar__link">Cursos</a></li>
            <li class="navbar__item"><a href="#" class="navbar__link">Expediciones</a></li>
            <li class="navbar__item"><a href="#" class="navbar__link">Biblioteca Ui</a></li>
          </ul>
        </nav>
      </header>

      <!-- Contenido del hero -->
      <div class="hero__content">
        <h1 class="hero__title">
          <span class="hero__title-line hero__title-line--script">Viví la montaña</span>
          <span class="hero__title-line hero__title-line--display">Desde adentro</span>
        </h1>
        <p class="hero__subtitle">
          Expediciones, formación y acompañamiento<br>
          profesional en la Patagonia.
        </p>
        <a href="#" class="hero__button">
          <span>Ver más</span>
          <svg class="hero__button-icon" width="18" height="14" viewBox="0 0 18 14" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 7H17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M11 1L17 7L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>

      <!-- Capa frontal: se desliza hacia arriba con el scroll y tapa el título -->
      <div class="hero__bg hero__bg--front" id="heroFront">
        <img src="assets/img/heroadelante.jpg" alt="">
      </div>

    </div>
  </section>

  <!-- Sección siguiente, solo para poder demostrar el scroll -->
  <section class="next-section">
    <p>Siguiente sección…</p>
  </section>

  <script src="js/script.js"></script>
</body>
</html>
